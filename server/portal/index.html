<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turbo Upload Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/portal/styles.css">
  <link rel="icon" type="image/png" href="https://turbo.net.au/favicon.png">
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-950 via-slate-900 to-gray-950 text-white">
  <div class="min-h-screen flex flex-col items-center justify-center px-4 py-8">
    <!-- Header -->
    <header class="mb-8">
      <img src="/portal/logo.png" alt="Turbo 360" class="h-10 mx-auto">
    </header>

    <main class="w-full max-w-md">

        <!-- Screen 1: PIN Entry -->
        <div id="screen-pin" class="card">
          <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-orange-500/20 flex items-center justify-center">
              <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </div>
            <h2 class="text-xl font-semibold mb-2">Enter Access PIN</h2>
            <p class="text-slate-400 text-sm">Enter the PIN provided by your event coordinator</p>
          </div>
          <form id="pin-form" class="space-y-6">
            <div class="flex justify-center gap-3" id="pin-inputs">
              <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" data-index="0" autocomplete="off">
              <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" data-index="1" autocomplete="off">
              <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" data-index="2" autocomplete="off">
              <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" data-index="3" autocomplete="off">
            </div>
            <div id="pin-error" class="text-red-400 text-sm text-center hidden"></div>
            <button type="submit" id="pin-submit" class="btn-primary w-full" disabled>
              Continue
            </button>
          </form>
        </div>

        <!-- Screen 2: Details -->
        <div id="screen-details" class="card hidden">
          <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-orange-500/20 flex items-center justify-center">
              <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <h2 class="text-xl font-semibold mb-2">Your Details</h2>
            <p class="text-slate-400 text-sm">Tell us who you are and what this upload is for</p>
          </div>
          <form id="details-form" class="space-y-4">
            <div>
              <label for="input-name" class="block text-sm font-medium text-slate-300 mb-1">Your Name</label>
              <input type="text" id="input-name" class="input-field" placeholder="e.g. John Smith" required>
            </div>
            <div>
              <label for="input-project" class="block text-sm font-medium text-slate-300 mb-1">Event / Project Name</label>
              <input type="text" id="input-project" class="input-field" placeholder="e.g. Smith Wedding" required>
            </div>
            <div id="details-error" class="text-red-400 text-sm text-center hidden"></div>
            <button type="submit" id="details-submit" class="btn-primary w-full">
              Continue to Upload
            </button>
          </form>
        </div>

        <!-- Screen 3: Upload -->
        <div id="screen-upload" class="card hidden">
          <div class="text-center mb-6">
            <h2 class="text-xl font-semibold mb-1">Upload Files</h2>
            <p class="text-slate-400 text-sm" id="upload-session-info"></p>
          </div>

          <!-- Drop Zone -->
          <div id="drop-zone" class="drop-zone mb-4">
            <svg class="w-12 h-12 text-slate-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="text-slate-400 text-sm mb-2">Drag & drop files here</p>
            <p class="text-slate-500 text-xs mb-3">or</p>
            <label class="btn-secondary cursor-pointer inline-block">
              Browse Files
              <input type="file" id="file-input" multiple class="hidden">
            </label>
          </div>

          <!-- Overall Progress -->
          <div id="overall-progress" class="hidden mb-4">
            <div class="flex justify-between text-sm text-slate-400 mb-1">
              <span>Overall Progress</span>
              <span id="overall-percent">0%</span>
            </div>
            <div class="progress-bar-bg">
              <div id="overall-bar" class="progress-bar-fill" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-xs text-slate-500 mt-1">
              <span id="files-count">0 / 0 files</span>
              <span id="upload-speed"></span>
            </div>
          </div>

          <!-- File List -->
          <div id="file-list" class="space-y-2 max-h-64 overflow-y-auto"></div>

          <!-- Upload Button -->
          <button id="upload-btn" class="btn-primary w-full mt-4 hidden">
            Upload <span id="upload-btn-count"></span> Files
          </button>

          <!-- Complete State -->
          <div id="upload-complete" class="hidden text-center py-6">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-green-500/20 flex items-center justify-center">
              <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
            <h3 class="text-lg font-semibold text-green-400 mb-1">Upload Complete!</h3>
            <p class="text-slate-400 text-sm" id="complete-summary"></p>
            <button id="upload-more-btn" class="btn-secondary mt-4">Upload More Files</button>
          </div>
        </div>

    </main>

    <footer class="mt-8 text-center text-slate-600 text-xs">
      Turbo 360 &copy; 2026
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tus-js-client@4.2.3/dist/tus.min.js"></script>
  <script src="/portal/upload.js"></script>
</body>
</html>
