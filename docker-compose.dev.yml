version: '3.8'

services:
  crew-upload:
    build: .
    container_name: crew-upload-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - UPLOAD_PASSWORD=tcrew26
      - POSTMARK_API_KEY=
      - NOTIFICATION_EMAIL=hello@turbo360.com.au
      - UPLOAD_DIR=/uploads
      - DATA_DIR=/data
      - BASE_URL=http://localhost:3847
      - JWT_SECRET=dev-secret-change-in-production
    volumes:
      - ./uploads:/uploads
      - ./data:/data
    ports:
      - "3847:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
