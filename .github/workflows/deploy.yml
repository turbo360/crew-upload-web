name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to NAS
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$NAS_SSH_KEY" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key
          ssh-keyscan -H -p 22 "$NAS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH_KEY=~/.ssh/nas_key
          REMOTE="$NAS_USER@$NAS_HOST"

          # Create archive (excluding unnecessary files)
          echo "=== Creating archive ==="
          tar -czf /tmp/deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='data' \
            --exclude='uploads' \
            .

          # Upload via SSH pipe (scp is restricted on this NAS)
          echo "=== Uploading to NAS ==="
          cat /tmp/deploy.tar.gz | ssh -i $SSH_KEY -p 22 -o StrictHostKeyChecking=no "$REMOTE" "cat > /volume1/docker/deploy.tar.gz"

          # Extract, swap, rebuild
          echo "=== Extracting and rebuilding ==="
          ssh -i $SSH_KEY -p 22 -o StrictHostKeyChecking=no "$REMOTE" bash << 'REMOTE_SCRIPT'
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            set -e

            # Create new directory and extract
            rm -rf /volume1/docker/crew-upload-new
            mkdir -p /volume1/docker/crew-upload-new
            tar -xzf /volume1/docker/deploy.tar.gz --no-same-owner -C /volume1/docker/crew-upload-new/
            rm -f /volume1/docker/deploy.tar.gz

            # Preserve data directory from old deploy
            if [ -d /volume1/docker/crew-upload/data ]; then
              cp -a /volume1/docker/crew-upload/data /volume1/docker/crew-upload-new/data 2>/dev/null || true
            fi

            # Swap directories
            mv /volume1/docker/crew-upload /volume1/docker/crew-upload-old
            mv /volume1/docker/crew-upload-new /volume1/docker/crew-upload

            # Rebuild and restart container
            cd /volume1/docker/crew-upload
            docker-compose build --no-cache
            docker-compose up -d

            # Cleanup
            rm -rf /volume1/docker/crew-upload-old

            echo "Deploy complete: $(date)"
          REMOTE_SCRIPT
