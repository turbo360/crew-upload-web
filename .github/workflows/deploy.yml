name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Probe NAS capabilities
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 22
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            echo "=== User info ==="
            whoami
            id
            echo "=== Docker without sudo ==="
            docker --version 2>&1 || echo "docker without sudo: FAILED"
            docker-compose --version 2>&1 || echo "docker-compose without sudo: FAILED"
            echo "=== File permissions ==="
            ls -la /volume1/docker/crew-upload/ | head -20
            echo "=== Can write? ==="
            touch /volume1/docker/crew-upload/.deploy-test && echo "CAN WRITE" && rm /volume1/docker/crew-upload/.deploy-test || echo "CANNOT WRITE"
