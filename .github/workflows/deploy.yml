name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='data' \
            --exclude='uploads' \
            .

      - name: Deploy to NAS
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
          NAS_PASSWORD: ${{ secrets.NAS_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "$NAS_SSH_KEY" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key
          ssh-keyscan -p 22 "$NAS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_CMD="ssh -i ~/.ssh/nas_key -p 22 $NAS_USER@$NAS_HOST"

          # Step 1: Extract files
          echo "=== Uploading and extracting files ==="
          cat /tmp/deploy.tar.gz | $SSH_CMD "echo '${NAS_PASSWORD}' | sudo -S tar -xzf - -C /volume1/docker/crew-upload/"

          # Step 2: Rebuild container
          echo "=== Rebuilding Docker container ==="
          $SSH_CMD "export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:\$PATH && echo '${NAS_PASSWORD}' | sudo -S docker-compose -f /volume1/docker/crew-upload/docker-compose.yml build --no-cache"

          # Step 3: Restart container
          echo "=== Restarting container ==="
          $SSH_CMD "export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:\$PATH && echo '${NAS_PASSWORD}' | sudo -S docker-compose -f /volume1/docker/crew-upload/docker-compose.yml up -d"

          echo "=== Deploy complete ==="
