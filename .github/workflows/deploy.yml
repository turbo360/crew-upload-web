name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='data' \
            --exclude='uploads' \
            .

      - name: Deploy to NAS
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$NAS_SSH_KEY" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key
          ssh-keyscan -p 22 "$NAS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_CMD="ssh -i ~/.ssh/nas_key -p 22 $NAS_USER@$NAS_HOST"

          # Upload to a writable location (parent dir is world-writable)
          echo "=== Uploading archive ==="
          scp -i ~/.ssh/nas_key -P 22 /tmp/deploy.tar.gz "$NAS_USER@$NAS_HOST:/volume1/docker/deploy.tar.gz"

          # Extract and rebuild
          echo "=== Extracting and rebuilding ==="
          $SSH_CMD << 'REMOTE'
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            set -e

            cd /volume1/docker/crew-upload

            # Extract with --no-same-owner to avoid permission issues
            tar -xzf /volume1/docker/deploy.tar.gz --no-same-owner -C /volume1/docker/crew-upload/
            rm -f /volume1/docker/deploy.tar.gz

            # Rebuild and restart
            docker-compose build --no-cache
            docker-compose up -d

            echo "Deploy complete: $(date)"
          REMOTE
