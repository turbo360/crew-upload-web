name: Deploy to Shootzu

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SHOOTZU_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SHOOTZU_HOST }} >> ~/.ssh/known_hosts

      - name: Backup current deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SHOOTZU_HOST }}
          username: ${{ secrets.SHOOTZU_USER }}
          key: ${{ secrets.SHOOTZU_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/opt/crew-uploads/server-src"
            BACKUP_DIR="/opt/crew-uploads/server-src.deploy-backup"
            rm -rf "$BACKUP_DIR"
            mkdir -p "$BACKUP_DIR"
            # Backup server/ and dist/ only (the deployable artifacts)
            [ -d "$DEPLOY_DIR/server" ] && cp -a "$DEPLOY_DIR/server" "$BACKUP_DIR/server"
            [ -d "$DEPLOY_DIR/dist" ] && cp -a "$DEPLOY_DIR/dist" "$BACKUP_DIR/dist"
            [ -f "$DEPLOY_DIR/package.json" ] && cp -a "$DEPLOY_DIR/package.json" "$BACKUP_DIR/"
            [ -f "$DEPLOY_DIR/package-lock.json" ] && cp -a "$DEPLOY_DIR/package-lock.json" "$BACKUP_DIR/"
            echo "Backup complete"

      - name: Deploy server and frontend
        run: |
          # Sync server/ with --delete (replace old server code completely)
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            server/ \
            ${{ secrets.SHOOTZU_USER }}@${{ secrets.SHOOTZU_HOST }}:/opt/crew-uploads/server-src/server/

          # Sync dist/ with --delete (replace old frontend build completely)
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            ${{ secrets.SHOOTZU_USER }}@${{ secrets.SHOOTZU_HOST }}:/opt/crew-uploads/server-src/dist/

          # Sync package files (no --delete, just update)
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            package.json package-lock.json \
            ${{ secrets.SHOOTZU_USER }}@${{ secrets.SHOOTZU_HOST }}:/opt/crew-uploads/server-src/

      - name: Install dependencies and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SHOOTZU_HOST }}
          username: ${{ secrets.SHOOTZU_USER }}
          key: ${{ secrets.SHOOTZU_SSH_KEY }}
          script: |
            set -e
            cd /opt/crew-uploads/server-src
            npm ci --omit=dev
            systemctl restart crew-upload-api
            echo "Service restarted, waiting for startup..."
            sleep 3

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SHOOTZU_HOST }}
          username: ${{ secrets.SHOOTZU_USER }}
          key: ${{ secrets.SHOOTZU_SSH_KEY }}
          script: |
            set -e
            HEALTH=$(curl -sf http://localhost:8086/health || echo "FAIL")
            if echo "$HEALTH" | grep -q "FAIL"; then
              echo "Health check failed — rolling back..."
              DEPLOY_DIR="/opt/crew-uploads/server-src"
              BACKUP_DIR="/opt/crew-uploads/server-src.deploy-backup"
              rm -rf "$DEPLOY_DIR/server" "$DEPLOY_DIR/dist"
              cp -a "$BACKUP_DIR/server" "$DEPLOY_DIR/server" 2>/dev/null || true
              cp -a "$BACKUP_DIR/dist" "$DEPLOY_DIR/dist" 2>/dev/null || true
              cp -a "$BACKUP_DIR/package.json" "$DEPLOY_DIR/" 2>/dev/null || true
              cp -a "$BACKUP_DIR/package-lock.json" "$DEPLOY_DIR/" 2>/dev/null || true
              cd "$DEPLOY_DIR" && npm ci --omit=dev
              systemctl restart crew-upload-api
              echo "Rollback complete"
              exit 1
            fi
            echo "Health check passed: $HEALTH"

      - name: Cleanup backup
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SHOOTZU_HOST }}
          username: ${{ secrets.SHOOTZU_USER }}
          key: ${{ secrets.SHOOTZU_SSH_KEY }}
          script: |
            rm -rf /opt/crew-uploads/server-src.deploy-backup
            echo "Deploy complete: $(date)"
