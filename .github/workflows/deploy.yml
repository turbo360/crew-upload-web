name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='data' \
            --exclude='uploads' \
            .

      - name: Deploy to NAS
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$NAS_SSH_KEY" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key
          ssh-keyscan -p 22 "$NAS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Pipe archive directly over SSH and extract with sudo (no temp file on NAS)
          cat /tmp/deploy.tar.gz | ssh -i ~/.ssh/nas_key -p 22 "$NAS_USER@$NAS_HOST" \
            "sudo tar -xzf - -C /volume1/docker/crew-upload/"

          # Rebuild and restart container
          ssh -i ~/.ssh/nas_key -p 22 "$NAS_USER@$NAS_HOST" \
            'export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH" && set -e && cd /volume1/docker/crew-upload && sudo docker-compose build --no-cache && sudo docker-compose up -d && echo "Deploy complete: $(date)"'
