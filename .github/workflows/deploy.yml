name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='data' \
            --exclude='uploads' \
            .

      - name: Upload archive to NAS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 22
          source: "/tmp/deploy.tar.gz"
          target: /volume1/docker
          strip_components: 1

      - name: Extract, rebuild, and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            set -e

            # Create new directory, extract files
            rm -rf /volume1/docker/crew-upload-new
            mkdir -p /volume1/docker/crew-upload-new
            tar -xzf /volume1/docker/deploy.tar.gz --no-same-owner -C /volume1/docker/crew-upload-new/
            rm -f /volume1/docker/deploy.tar.gz

            # Preserve data directory (symlink or copy)
            if [ -d /volume1/docker/crew-upload/data ]; then
              cp -a /volume1/docker/crew-upload/data /volume1/docker/crew-upload-new/data
            fi

            # Swap directories (parent dir is writable)
            mv /volume1/docker/crew-upload /volume1/docker/crew-upload-old
            mv /volume1/docker/crew-upload-new /volume1/docker/crew-upload

            # Rebuild and restart
            cd /volume1/docker/crew-upload
            docker-compose build --no-cache
            docker-compose up -d

            # Cleanup old directory
            rm -rf /volume1/docker/crew-upload-old

            echo "Deploy complete: $(date)"
