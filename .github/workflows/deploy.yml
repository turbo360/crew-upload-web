name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload archive to NAS
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$NAS_SSH_KEY" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key

          tar -czf /tmp/deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='data' \
            --exclude='uploads' \
            .

          cat /tmp/deploy.tar.gz | ssh -i ~/.ssh/nas_key -p 22 -o StrictHostKeyChecking=no \
            "$NAS_USER@$NAS_HOST" "cat > /volume1/docker/deploy.tar.gz"

      - name: Extract files and rebuild container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          envs: SUDO_PASS
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            set -e

            SUDO="echo $SUDO_PASS | sudo -S"

            # Clean up leftover dirs from previous failed deploys
            $SUDO rm -rf /volume1/docker/crew-upload-old /volume1/docker/crew-upload-new 2>/dev/null

            # Extract to new directory
            mkdir -p /volume1/docker/crew-upload-new
            tar -xzf /volume1/docker/deploy.tar.gz --no-same-owner -C /volume1/docker/crew-upload-new/
            rm -f /volume1/docker/deploy.tar.gz

            # Preserve data directory
            if [ -d /volume1/docker/crew-upload/data ]; then
              $SUDO cp -a /volume1/docker/crew-upload/data /volume1/docker/crew-upload-new/data
            fi

            # Swap directories
            $SUDO mv /volume1/docker/crew-upload /volume1/docker/crew-upload-old
            mv /volume1/docker/crew-upload-new /volume1/docker/crew-upload

            # Rebuild and restart
            cd /volume1/docker/crew-upload
            $SUDO docker-compose build --no-cache
            $SUDO docker-compose up -d

            # Cleanup
            $SUDO rm -rf /volume1/docker/crew-upload-old

            echo "Deploy complete: $(date)"
        env:
          SUDO_PASS: ${{ secrets.NAS_PASSWORD }}
