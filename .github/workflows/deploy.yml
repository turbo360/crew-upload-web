name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to NAS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 22
          source: "server/,src/,public/,package.json,package-lock.json,Dockerfile,docker-compose.yml,vite.config.ts,tailwind.config.js,postcss.config.js,tsconfig.json,tsconfig.node.json,index.html"
          target: /volume1/docker/crew-upload
          overwrite: true
          strip_components: 0

      - name: Rebuild and restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            set -e
            cd /volume1/docker/crew-upload
            docker-compose build --no-cache
            docker-compose up -d
            echo "Deploy complete: $(date)"
