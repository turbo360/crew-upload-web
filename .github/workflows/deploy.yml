name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_KEY }}" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key
          ssh-keyscan -p 22 ${{ secrets.NAS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync files to NAS
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'data' \
            --exclude 'uploads' \
            -e "ssh -i ~/.ssh/nas_key -p 22" \
            ./ ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}:/volume1/docker/crew-upload/

      - name: Rebuild and restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            set -e
            cd /volume1/docker/crew-upload
            docker-compose build --no-cache
            docker-compose up -d
            echo "Deploy complete: $(date)"
