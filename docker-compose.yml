version: '3.8'

services:
  crew-upload:
    build: .
    container_name: crew-upload
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - POSTMARK_API_KEY=8d84da95-5c70-47ea-ac72-d70d71f4c2c2
      - NOTIFICATION_EMAIL=hello@turbo360.com.au
      - UPLOAD_DIR=/uploads
      - DATA_DIR=/data
      - BASE_URL=https://upload.turbo.net.au
      - JWT_SECRET=47ed8591dce5fa6e152cf9ca4568010b0a65f822615c6f73ddbf4af3b433fc78
      - TURBO_API_URL=https://turbo.net.au
      - TURBO_API_KEY=turbo360-crew-webhook-key
    volumes:
      - "/volume1/Crew Uploads:/uploads"
      - /volume1/docker/crew-upload/data:/data
    ports:
      - "3847:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
