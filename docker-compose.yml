version: '3.8'

services:
  crew-upload:
    build: .
    container_name: crew-upload
    restart: unless-stopped
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=3847
      - POSTMARK_API_KEY=***REDACTED_POSTMARK_KEY***
      - NOTIFICATION_EMAIL=hello@turbo360.com.au
      - UPLOAD_DIR=/uploads
      - DATA_DIR=/data
      - BASE_URL=https://upload.turbo.net.au
      - JWT_SECRET=***REDACTED_JWT_SECRET***
      - TURBO_API_URL=https://turbo.net.au
      - TURBO_API_KEY=***REDACTED_API_KEY***
    volumes:
      - "/volume1/Crew Uploads:/uploads"
      - /volume1/docker/crew-upload/data:/data
    pid: host
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3847/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
